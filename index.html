<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phash – Perceptual image hash</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    input[type="file"] { margin-bottom: 1rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    #result { margin-top: 1rem; padding: 1rem; background: #f5f5f5; border-radius: 6px; font-family: ui-monospace, monospace; font-size: 0.875rem; white-space: pre-wrap; word-break: break-all; }
    #result.error { background: #fef2f2; color: #991b1b; }
    #result:empty { display: none; }
  </style>
</head>
<body>
  <h1>Phash – Perceptual image hash</h1>
  <form id="form">
    <label for="image">Image file</label>
    <input type="file" id="image" name="image" accept="image/*" required>
    <button type="submit">Compute phash</button>
  </form>
  <div id="result"></div>

  <script>
    const form = document.getElementById('form');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('image');
      if (!input.files || !input.files[0]) {
        result.textContent = 'Please select an image.';
        result.className = 'error';
        return;
      }

      result.textContent = 'Computing…';
      result.className = '';

      const fd = new FormData();
      fd.append('image', input.files[0]);

      try {
        const res = await fetch('/phash', {
          method: 'POST',
          body: fd
        });
        const data = await res.json();
        if (!res.ok) {
          result.textContent = data.error || res.statusText;
          result.className = 'error';
          return;
        }
        result.textContent = JSON.stringify(data, null, 2);
        result.className = '';
      } catch (err) {
        result.textContent = 'Request failed: ' + err.message;
        result.className = 'error';
      }
    });
  </script>
</body>
</html>
